<!DOCTYPE html>
<html lang="en-US">

<head>
    <title></title>
    <link href="css/style.css" rel="stylesheet">
    <link href="favicon-16x16.png" rel="icon" type="image/x-icon">
    <meta name="viewport" content="width= device-width, initial-scale=1.0">
    <meta name="author" content="Abiodun Oke">
    <meta name="description" content="How to use JavaScript to create elements,append to a html document ">
    <script src="js/script.js" defer></script>
</head>

<body class="body-tag">
    <header>
        <div class="container">
            <h1 class="gradient">Emoji journal</h1>
            <p>use <span class="highlight-1">emojis</span> to track your <span class="highlight-2">mood</span>.</p>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="input-container">
                <input type="text" class="input-el" placeholder="Enter an emoji 😀">
                <button class="btn save-btn">save</button>
            </div>
            <div id="emoji-container"></div>
            <div class="journal">
                <h2 class="journal-title">Journal</h2>
                <ul id="list-container"></ul>
            </div>

            <button class="btn delete-btn">delete all</button>
        </div>
    </main>
    <footer>
        <p>&copy; MasterContender 2022</p>
    </footer>
</body>

</html>
